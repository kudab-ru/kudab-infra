services:
  kudab-api:
    environment:
      APP_ENV: ci
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      DB_CONNECTION: pgsql
      DB_HOST: kudab-db
      DB_PORT: 5432
      DB_DATABASE: kudab_ci
      DB_USERNAME: kudab_ci
      DB_PASSWORD: kudab_ci
    command: ["sh", "-c", "php artisan migrate --force && php artisan test"]

  kudab-parser:
    environment:
      APP_ENV: ci
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      DB_CONNECTION: pgsql
      DB_HOST: kudab-db
      DB_PORT: 5432
      DB_DATABASE: kudab_ci
      DB_USERNAME: kudab_ci
      DB_PASSWORD: kudab_ci
    command: ["sh", "-c", "php artisan migrate --force && php artisan test"]

  kudab-frontend:
    environment:
      NODE_ENV: test
    command: ["sh", "-c", "npm run test"]  # если есть тесты

  kudab-admin:
    environment:
      NODE_ENV: test
    command: ["sh", "-c", "npm run test"]

  kudab-bot:
    environment:
      BOT_ENV: test
    command: ["sh", "-c", "pytest || echo 'No tests'"]

  kudab-publisher:
    environment:
      PUBLISHER_ENV: test
    command: ["sh", "-c", "pytest || echo 'No tests'"]

  kudab-recommendations:
    environment:
      RECOMMEND_ENV: test
    command: ["sh", "-c", "pytest || echo 'No tests'"]

  kudab-nginx:
    environment:
      NGINX_ENV: ci

  kudab-db:
    image: postgres:15-alpine
    container_name: kudab-db
    environment:
      POSTGRES_DB: kudab_ci
      POSTGRES_USER: kudab_ci
      POSTGRES_PASSWORD: kudab_ci
    tmpfs:
      - /var/lib/postgresql/data  # быстрые тесты, не сохраняет state

  redis:
    image: redis:7-alpine
    container_name: kudab-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redispass}"]

  swagger:
    image: swaggerapi/swagger-ui
    container_name: kudab-swagger
    environment:
      SWAGGER_JSON: /swagger/swagger.yaml
    volumes:
      - ./docs/swagger:/swagger:ro

# volumes тут не нужны (никаких data не сохраняем между тестами)
