version: "3.9"

services:
  kudab-api:
    environment:
      APP_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    volumes:
      - ./services/kudab-api:/var/www/html:rw
      - ./services/kudab-api/vendor:/var/www/html/vendor
      - ./services/kudab-api/storage:/var/www/html/storage
    # Можно добавить nodemon/hot reload как отдельный сервис если нужно

  kudab-parser:
    environment:
      APP_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    volumes:
      - ./services/kudab-parser:/var/www/html:rw
      - ./services/kudab-parser/vendor:/var/www/html/vendor
      - ./services/kudab-parser/storage:/var/www/html/storage

  kudab-frontend:
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"     # Прямой доступ для hot-reload
    volumes:
      - ./services/kudab-frontend:/app:rw
      - /app/node_modules

  kudab-admin:
    environment:
      NODE_ENV: development
    ports:
      - "8080:8080"
    volumes:
      - ./services/kudab-admin:/app:rw
      - /app/node_modules

  kudab-bot:
    environment:
      BOT_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    volumes:
      - ./services/kudab-bot:/app:rw

  kudab-publisher:
    environment:
      PUBLISHER_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    volumes:
      - ./services/kudab-publisher:/app:rw

  kudab-recommendations:
    environment:
      RECOMMEND_ENV: development
    volumes:
      - ./services/kudab-recommendations:/app:rw

  kudab-nginx:
    environment:
      NGINX_ENV: development
    ports:
      - "8088:80"      # Не мешаем прод-порту
    volumes:
      - ./services/kudab-nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    image: redis:7-alpine
    container_name: ${KUDAB_REDIS_CONTAINER:-kudab-redis}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redispass}"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  swagger:
    image: swaggerapi/swagger-ui
    container_name: kudab-swagger
    environment:
      SWAGGER_JSON: /swagger/swagger.yaml
    volumes:
      - ./docs/swagger:/swagger:ro
    ports:
      - "8181:8080"   # наружу для удобного доступа в dev

volumes:
  redisdata:
