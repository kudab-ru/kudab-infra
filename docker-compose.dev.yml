services:
  kudab-api:
    environment:
      APP_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    volumes:
      - ./services/kudab-api:/var/www/html:rw
      - ./services/kudab-api/vendor:/var/www/html/vendor
      - ./services/kudab-api/storage:/var/www/html/storage

  kudab-parser:
    environment:
      APP_ENV: local
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      REDIS_CLIENT: phpredis
    volumes:
      - ./services/kudab-parser:/var/www/html:rw
      - ./services/kudab-parser/vendor:/var/www/html/vendor
      - ./services/kudab-parser/storage:/var/www/html/storage
    command: >
      sh -c "php artisan migrate --force &&
             php artisan horizon"

  kudab-parser-fpm:
    environment:
      APP_ENV: local
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      REDIS_CLIENT: phpredis

  kudab-horizon:
    environment:
      APP_ENV: local
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      REDIS_CLIENT: phpredis

  kudab-frontend:
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./services/kudab-frontend:/app:rw
      - /app/node_modules

  kudab-bot:
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      BOT_ENV: development
      RUNNER: uvicorn
    env_file:
      - ./services/kudab-bot/.env.dev
    volumes:
      - ./services/kudab-bot:/app:rw
    ports:
      - "127.0.0.1:8000:8000"


  kudab-recommendations:
    environment:
      RECOMMEND_ENV: development
    volumes:
      - ./services/kudab-recommendations:/app:rw

  kudab-nginx:
    environment:
      NGINX_ENV: development
    ports:
      - "8088:80"
    volumes:
      - ./services/kudab-nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro

  kudab-db:
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ${KUDAB_REDIS_CONTAINER:-kudab-redis}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redispass}"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  swagger:
    image: swaggerapi/swagger-ui
    container_name: kudab-swagger
    environment:
      SWAGGER_JSON: /swagger/swagger.yaml
    volumes:
      - ./docs/swagger:/swagger:ro
    ports:
      - "8181:8080"

volumes:
  redisdata:
