services:
  kudab-api:
    image: ${API_IMAGE:-kudab-api:latest}
    restart: always
    env_file:
      - ./services/kudab-api/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"   # чтобы About не показывал ENABLED

  kudab-api-scheduler:
    image: ${API_IMAGE:-kudab-api}
    command: sh -lc 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    restart: always
    env_file:
      - ./services/kudab-api/.env
    environment:
      APP_ENV: production
    depends_on:
      - kudab-db
      - redis

  kudab-parser:
    image: ${PARSER_IMAGE:-kudab-parser:latest}
    build: ./services/kudab-parser
    restart: always
    env_file:
      - ./services/kudab-parser/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      XDG_CONFIG_HOME: /tmp
      HOME: /tmp
      DB_CONNECTION: pgsql
      DB_HOST: kudab-db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-kudab}
      DB_USERNAME: ${POSTGRES_USER:-kudab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kudab}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    depends_on:
      - kudab-db
      - redis

  kudab-horizon:
    image: ${PARSER_IMAGE:-kudab-parser}
    restart: always
    env_file:
      - ./services/kudab-parser/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      XDG_CONFIG_HOME: /tmp
      HOME: /tmp
      QUEUE_CONNECTION: redis
      HORIZON_PREFIX: "kudab_prod_hz:"
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      # те же БД-параметры на всякий
      DB_CONNECTION: pgsql
      DB_HOST: kudab-db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-kudab}
      DB_USERNAME: ${POSTGRES_USER:-kudab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kudab}
    command: sh -lc "php artisan optimize:clear && php artisan horizon"
    depends_on:
      - redis
      - kudab-db

  kudab-parser-scheduler:
    image: ${PARSER_IMAGE:-kudab-parser}
    command: sh -lc 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    restart: always
    env_file:
      - ./services/kudab-parser/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      XDG_CONFIG_HOME: /tmp
      HOME: /tmp
      # жёстко дублируем БД/Redis — чтобы НИКОГДА не свалился на sqlite
      DB_CONNECTION: pgsql
      DB_HOST: kudab-db
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-kudab}
      DB_USERNAME: ${POSTGRES_USER:-kudab}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kudab}
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    depends_on:
      - kudab-horizon
      - kudab-db
      - redis

  # === FRONT/BOT/NGINX ======================================================
  kudab-frontend:
    restart: always
    environment:
      NODE_ENV: production

  kudab-bot:
    env_file:
      - ./services/kudab-bot/.env
    environment:
      BOT_ENV: production
      BOT_MODE: webhook
      RUNNER: gunicorn
      PUBLIC_SITE_URL: ${APP_URL:-https://kudab.ru}
    restart: unless-stopped

  kudab-bot-cron:
    image: kudab-bot:latest
    env_file:
      - ./services/kudab-bot/.env
    environment:
      BOT_ENV: production
      BOT_MODE: webhook
      RUNNER: cron
      PUBLIC_SITE_URL: ${APP_URL:-https://kudab.ru}
    depends_on:
      - kudab-api
      - kudab-db
      - redis
    command: sh -lc 'while true; do python -m app.bot.cron.run_single_broadcasts; sleep 60; done'
    restart: always

  kudab-nginx:
    restart: always
    environment:
      NGINX_ENV: production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/kudab-nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/prod:/etc/nginx/certs:ro

  # === DB ====================================================================
  kudab-db:
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kudab}
      POSTGRES_USER: ${POSTGRES_USER:-kudab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kudab}

volumes:
  pgdata:

