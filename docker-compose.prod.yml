services:
  kudab-api:
    restart: always
    environment:
      APP_ENV: production
      # Можно добавить другие продакшн-переменные, если нужно

  kudab-parser:
    restart: always
    environment:
      APP_ENV: production

  kudab-frontend:
    restart: always
    environment:
      NODE_ENV: production

#  kudab-admin:
#    restart: always
#    environment:
#      NODE_ENV: production

  kudab-bot:
    env_file:
      - ./services/kudab-bot/.env
    environment:
      BOT_ENV: production
      BOT_MODE: webhook
      RUNNER: gunicorn
    # порт наружу НЕ публикуем, ходим через nginx внутр. сеть
    restart: unless-stopped

#  kudab-publisher:
#    restart: always
#    environment:
#      PUBLISHER_ENV: production

  kudab-recommendations:
    restart: always
    environment:
      RECOMMEND_ENV: production

  kudab-nginx:
    restart: always
    environment:
      NGINX_ENV: production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/kudab-nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/prod:/etc/nginx/certs:ro
    # В продакшене ports остаются стандартными 80/443 (как в базовом файле)
    # Volume только для конфигов и сертификатов (уже задано в базовом)

  kudab-horizon:
    restart: always
    environment:
      APP_ENV: production
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      REDIS_CLIENT: phpredis
      HORIZON_PREFIX: "kudab_prod_hz:"
    command: sh -lc "php artisan optimize:clear && php artisan horizon"
    depends_on:
      - redis
      - kudab-db

  scheduler:
    image: ${PARSER_IMAGE:-kudab-parser}
    command: sh -lc 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    depends_on:
      - kudab-horizon
    environment:
      APP_ENV: production

  kudab-db:
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kudab}
      POSTGRES_USER: ${POSTGRES_USER:-kudab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kudab}

volumes:
  pgdata:
