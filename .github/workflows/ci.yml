name: CI & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: kudab_ci
          POSTGRES_USER: kudab_ci
          POSTGRES_PASSWORD: kudab_ci
        ports: [5432:5432]
        options: >-
          --health-cmd="pg_isready -U kudab_ci" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy example env
        run: cp .env.example .env

      - name: Build & Run containers for CI
        run: |
          docker-compose -f docker-compose.yml -f docker-compose.ci.yml up --abort-on-container-exit --exit-code-from kudab-api

      - name: Show logs if failed
        if: failure()
        run: docker-compose -f docker-compose.yml -f docker-compose.ci.yml logs

      - name: Shutdown containers
        if: always()
        run: docker-compose -f docker-compose.yml -f docker-compose.ci.yml down -v
