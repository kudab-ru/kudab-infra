name: Deploy

on:
  workflow_dispatch:      # запуск вручную по кнопке
  push:
    branches: [main]      # или prod/master — по желанию

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'skip deploy'
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GH_TOKEN }}

      - name: Copy env (если нужно)
        run: cp .env.example .env
        working-directory: services/kudab-api

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server (ssh)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} << 'EOF'
            cd ${{ vars.PROD_DIRECTORY }}
            git pull
            git submodule update --init --recursive
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -af
          EOF
