name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

# (необязательно, но полезно) — не пускать параллельные прод-деплои
concurrency:
  group: deploy-prod
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'skip deploy'

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Copy env (если нужно)
        run: cp .env.example .env
        working-directory: services/kudab-api

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          log-public-key: true

      - name: Deploy to server (ssh)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ${{ vars.PROD_DIRECTORY }}

            # Обновляем код
            git checkout main
            git rev-parse HEAD > .last_deployed_commit
            git pull
            git submodule update --init --recursive

            # Пересобираем образы (API соберётся с pcntl согласно Dockerfile)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --pull

            # Ротация :latest -> :previous только для своих сервисов
            for service in kudab-api kudab-nginx kudab-frontend kudab-parser; do
              if docker image inspect $service:latest >/dev/null 2>&1; then
                docker tag $service:latest $service:previous
                echo "$service:latest -> $service:previous сохранён"
              fi
            done

            # Тянем только внешние/инфраструктурные образы
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull kudab-db redis swagger

            # Запускаем/обновляем
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            # Мини health-wait для критичных зависимостей
            timeout=120; interval=5; elapsed=0; services="kudab-nginx kudab-db"
            while [ $elapsed -lt $timeout ]; do
              all_healthy=true
              for service in $services; do
                status=$(docker inspect --format '{{.State.Health.Status}}' $service 2>/dev/null || echo 'notfound')
                if [ "$status" != "healthy" ]; then
                  all_healthy=false
                  echo "$service not healthy yet: $status"
                fi
              done
              [ "$all_healthy" = true ] && echo "All critical services healthy." && break
              sleep $interval; elapsed=$((elapsed + $interval))
            done
            if [ "$all_healthy" != true ]; then
              echo "::error ::Timeout waiting for containers to become healthy"
              for service in $services; do
                docker inspect --format 'HEALTH: {{.State.Health.Status}}' $service 2>/dev/null || true
                docker logs $service || true
              done
              exit 1
            fi

            docker image prune -af
          EOF

      - name: Backup DB before migrations
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} \
          'cd ${{ vars.PROD_DIRECTORY }} && ./scripts/backup_db.sh'

      - name: Run migrations (+ cache clear, guard для Horizon)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} << 'EOF'
            set -Eeuo pipefail
            cd ${{ vars.PROD_DIRECTORY }}

            # 1) Сначала миграции (чтобы не падал optimize:clear при CACHE_STORE=database)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T kudab-api php artisan migrate --force

            # 2) Затем очистка и пересбор кешей
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T kudab-api php artisan optimize:clear
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T kudab-api php artisan optimize

            # 3) Horizon: перезапускаем только если пакет есть и pcntl загружен
            if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T kudab-api \
              php -r 'require "vendor/autoload.php"; exit(class_exists("Laravel\\Horizon\\Horizon")?0:1);'
            then
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T kudab-api \
                php -r 'exit(extension_loaded("pcntl")?0:1);'
              then
                docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T kudab-api php artisan horizon:terminate || true
              else
                echo "::warning ::Horizon установлен, но расширение pcntl не загружено; пропускаем horizon:terminate"
              fi
            fi
          EOF

      - name: Smoke test (API + Frontend)
        env:
          APP_URL: https://kudasobrat.ru
          # опционально: user:password для Basic Auth
          API_BASIC_AUTH: ${{ secrets.API_BASIC_AUTH }}
          FRONTEND_BASIC_AUTH: ${{ secrets.FRONTEND_BASIC_AUTH }}
        run: |
          set -Eeuo pipefail
          CURL_OPTS=(-skL --max-time 10 --connect-timeout 5 --retry 24 --retry-delay 5 --retry-connrefused --retry-all-errors)
          api="$APP_URL/api/ping"
          fe="$APP_URL/"

          echo "::group::API"
          api_resp="$(curl "${CURL_OPTS[@]}" ${API_BASIC_AUTH:+-u "$API_BASIC_AUTH"} -w $'\n%{http_code}' "$api" || true)"
          code="${api_resp##*$'\n'}"; body="${api_resp%$'\n'$code}"
          echo "API HTTP: $code"
          printf "%s" "$body" > api_ping.json || true
          [[ "$code" == "200" ]] && grep -q '"ok"[[:space:]]*:[[:space:]]*true' api_ping.json || { echo "::error ::API unhealthy: HTTP $code"; exit 1; }
          echo "::endgroup::"

          echo "::group::Frontend"
          fe_resp="$(curl "${CURL_OPTS[@]}" ${FRONTEND_BASIC_AUTH:+-u "$FRONTEND_BASIC_AUTH"} -H 'Accept: text/html' -w $'\n%{http_code}' "$fe" || true)"
          fe_code="${fe_resp##*$'\n'}"; fe_body="${fe_resp%$'\n'$fe_code}"
          echo "FE  HTTP: $fe_code"

          # Если фронт закрыт Basic Auth и секрет не задан — считаем это приемлемым сигналом живости.
          if [[ "$fe_code" == "401" && -z "${FRONTEND_BASIC_AUTH:-}" ]]; then
            echo "::notice ::Frontend требует Basic Auth (401). FRONTEND_BASIC_AUTH не задан — трактуем как healthy."
          else
            [[ "$fe_code" == "200" || "$fe_code" == "301" || "$fe_code" == "302" ]] && printf "%s" "$fe_body" | grep -iq "<html" \
              || { echo "::error ::Frontend unhealthy: HTTP $fe_code"; exit 1; }
          fi
          echo "::endgroup::"

      - name: Debug on failure (ps + last logs)
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} <<'SSH'
            set -Eeuo pipefail
            cd ${{ vars.PROD_DIRECTORY }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            echo "--- nginx logs (tail 200) ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200 kudab-nginx || true
            echo "--- api logs (tail 200) ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=200 kudab-api || true
          SSH

      - name: Rollback all services (ssh)
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} '
            cd ${{ vars.PROD_DIRECTORY }} && ./scripts/rollback.sh
          '
