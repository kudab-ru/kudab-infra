name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'skip deploy'
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GH_TOKEN }}

      - name: Copy env (если нужно)
        run: cp .env.example .env
        working-directory: services/kudab-api

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server (ssh)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} << 'EOF'
            set -e
            cd ${{ vars.PROD_DIRECTORY }}
            git rev-parse HEAD > .last_deployed_commit
            git pull
            git submodule update --init --recursive

            # --- Явная сборка всех образов с тегом :latest ---
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build

            # --- Сохраняем старые образы как :previous только для :latest ---
            services=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml config --services)

            for service in $services; do
              image=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml images -q $service)
              if [ -n "$image" ]; then
                repo=$(docker inspect --format='{{index .RepoTags 0}}' $image)
                if [[ "$repo" == *:latest ]]; then
                  repo_base=${repo%:latest}
                  docker tag "$repo_base:latest" "$repo_base:previous"
                  echo "$repo_base:latest -> $repo_base:previous сохранён"
                else
                  echo "$repo не тегируется (не :latest), пропущено"
                fi
              else
                echo "Образ для $service не найден, пропущено"
              fi
            done
            
            # --- Дальше обычный деплой ---
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            
            docker images | grep kudab
            
            timeout=120
            interval=5
            elapsed=0
            
            services="kudab-nginx kudab-db"
            
            while [ $elapsed -lt $timeout ]; do
              all_healthy=true
              for service in $services; do
                status=$(docker inspect --format '{{.State.Health.Status}}' $service 2>/dev/null || echo 'notfound')
                if [ "$status" != "healthy" ]; then
                  all_healthy=false
                  echo "$service not healthy yet: $status"
                fi
              done
              if [ "$all_healthy" = true ]; then
                echo "All critical services healthy."
                break
              fi
              sleep $interval
              elapsed=$((elapsed + $interval))
            done
            
            if [ "$all_healthy" != true ]; then
              echo "::error ::Timeout waiting for containers to become healthy"
              for service in $services; do
                docker inspect --format 'HEALTH: {{.State.Health.Status}}' $service 2>/dev/null || true
                docker logs $service || true
              done
              exit 1
            fi
            
            docker image prune -af
          EOF
      - name: Backup DB before migrations
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} \
          'cd ${{ vars.PROD_DIRECTORY }} && ./scripts/backup_db.sh'
      - name: Run migrations
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} << EOF
            cd ${{ vars.PROD_DIRECTORY }}
            ./scripts/migrate.sh
          EOF
      - name: Smoke test (API + frontend)
        env:
          APP_URL: https://kudasobrat.ru
        run: |
          curl -sk $APP_URL/api/ping | grep -q "\"ok\":true"
          curl -sk $APP_URL/api/ping | grep -q "\"result\":\"pong\""
          curl -sk $APP_URL/ | grep -q "<html"

      - name: Rollback all services (ssh)
        if: failure()
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.PROD_SSH_USER }}@${{ vars.PROD_SSH_HOST }} '
            cd ${{ vars.PROD_DIRECTORY }} && ./scripts/rollback.sh
          '