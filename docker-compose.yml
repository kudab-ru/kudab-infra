services:
  kudab-api:
    user: "${UID}:${GID}"
    build: ./services/kudab-api
    container_name: ${KUDAB_API_CONTAINER:-kudab-api}
    env_file: .env
    volumes:
      - ./services/kudab-api:/var/www/html:rw
    expose:
      - "9000"   # php-fpm порт для nginx, НЕ наружу
    depends_on:
      - kudab-db
      - kudab-recommendations
      - redis
    healthcheck:
#      test: [ "CMD", "curl", "-f", "http://localhost/api/ping" ]
      test: [ "CMD", "true" ]
      interval: 30s
      timeout: 10s
      retries: 3

  kudab-parser:
    user: "${UID}:${GID}"
    build: ./services/kudab-parser
    container_name: ${KUDAB_PARSER_CONTAINER:-kudab-parser}
    env_file: .env
    volumes:
      - ./services/kudab-parser:/var/www/html:rw
    depends_on:
      - kudab-db
      - kudab-api

  kudab-frontend:
    build: ./services/kudab-frontend
    container_name: ${KUDAB_FRONTEND_CONTAINER:-kudab-frontend}
    env_file: .env
    expose:
      - "${FRONTEND_PORT:-3000}"
#    volumes:
#      - ./services/kudab-frontend:/app:rw
    depends_on:
      - kudab-api
#    healthcheck:
#      test: [ "CMD", "curl", "-f", "http://localhost:3000/" ]
#      interval: 30s
#      timeout: 10s
#      retries: 3

  kudab-admin:
    build: ./services/kudab-admin
    container_name: ${KUDAB_ADMIN_CONTAINER:-kudab-admin}
    env_file: .env
    expose:
      - "${ADMIN_PORT:-8080}"
    volumes:
      - ./services/kudab-admin:/app:rw
    depends_on:
      - kudab-api

  kudab-bot:
    build: ./services/kudab-bot
    container_name: ${KUDAB_BOT_CONTAINER:-kudab-bot}
    env_file: .env
    volumes:
      - ./services/kudab-bot:/app:rw
    depends_on:
      - kudab-api

  kudab-publisher:
    build: ./services/kudab-publisher
    container_name: ${KUDAB_PUBLISHER_CONTAINER:-kudab-publisher}
    env_file: .env
    volumes:
      - ./services/kudab-publisher:/app:rw
    depends_on:
      - kudab-api

  kudab-recommendations:
    build: ./services/kudab-recommendations
    container_name: ${KUDAB_RECOMMENDATIONS_CONTAINER:-kudab-recommendations}
    env_file: .env
    expose:
      - "${RECOMMEND_PORT:-8081}"
    volumes:
      - ./services/kudab-recommendations:/app:rw

  kudab-nginx:
    build: ./services/kudab-nginx
    container_name: ${KUDAB_NGINX_CONTAINER:-kudab-nginx}
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
#      - ./services/kudab-nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./services/kudab-api/public:/var/www/html/public:ro
      - ./services/kudab-api:/var/www/html:ro
      - ./certs/prod:/etc/nginx/certs:ro
    depends_on:
      - kudab-api
      - kudab-frontend
      - kudab-admin
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ && curl -f http://localhost/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ${KUDAB_REDIS_CONTAINER:-kudab-redis}
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD:-redispass}" ]
    expose:
      - "6379"
    volumes:
      - redisdata:/data

  swagger:
    image: swaggerapi/swagger-ui
    container_name: kudab-swagger
    environment:
      SWAGGER_JSON: /swagger/swagger.yaml
    volumes:
      - ./docs/swagger:/swagger:ro
    ports:
      - "8181:8080"   # наружу только в dev

  kudab-db:
    image: postgres:15-alpine
    container_name: ${KUDAB_DB_CONTAINER:-kudab-db}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kudab}
      POSTGRES_USER: ${POSTGRES_USER:-kudab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kudab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kudab" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
